# Netlify configuration for Blood Donor Management System
[build]
  # Build command - runs the React build from client directory
  command = "cd client && npm ci && npm run build"
  # Directory to publish (the React build output)
  publish = "client/build"

[env]
  # Production environment
  [env.production]
    # Environment variables for production
    NODE_ENV = "production"

# Redirect rules for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
